# SC is admin task
# SC will create the volume on demand when PVC is created
# EBS volume will automatically get created when PVC is created
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: roboshop-ebs         # assume we are creating the EBS for roboshop application using StorageClass
provisioner: ebs.csi.aws.com  # these drivers will take care of create the ebs volume on demand when PVC is created
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-dynamic-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: roboshop-ebs
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ebs-dynamic-app
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: html-data
          mountPath: /usr/share/nginx/html
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1c  # Ensure the Pod is scheduled in the same AZ as the EBS volume
  volumes:
    - name: html-data
      persistentVolumeClaim:
        claimName: ebs-dynamic-pvc